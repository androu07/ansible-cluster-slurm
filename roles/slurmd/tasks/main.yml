---
# ===== SLURM Compute Daemon (slurmd) =====

- name: Asegurar directorio de configuración
  ansible.builtin.file:
    path: /etc/slurm
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'
  loop:
    - /etc/slurm
    - /etc/slurm
    - /var/lib/slurm
    - /var/spool/slurmd

- name: Enviar slurm.conf maestro a los workers
  ansible.builtin.template:
    src: "../../common/templates/slurm.conf.j2"
    dest: /etc/slurm/slurm.conf
    owner: slurm
    group: slurm
    mode: '0644'
  notify: Reiniciar slurmd

- name: Distribuir configuración de Cgroups
  ansible.builtin.template:
    src: cgroup.conf.j2
    dest: /etc/slurm/cgroup.conf
    owner: slurm
    group: slurm
    mode: '0644'
  notify: Reiniciar slurmd
  tags:
    - cgroup_config

- name: Iniciar servicio Slurmd (Worker Daemon)
  ansible.builtin.service:
    name: slurmd
    state: started
    enabled: yes
  tags:
    - start_slurmd
