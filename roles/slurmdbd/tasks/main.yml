---
# ===== Configuración de SlurmDBD =====

- name: Instalar slurmdbd
  ansible.builtin.apt:
    name: slurmdbd
    state: present
  tags:
    - install_slurmdbd

- name: Asegurar directorio de logs con permisos correctos
  ansible.builtin.file:
    path: /var/log/slurm
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'

- name: Crear archivo de log si no existe
  ansible.builtin.file:
    path: /var/log/slurm/slurmdbd.log
    state: touch
    owner: slurm
    group: slurm
    mode: '0644'

- name: Configurar archivo slurmdbd.conf
  ansible.builtin.template:
    src: slurmdbd.conf.j2
    dest: /etc/slurm/slurmdbd.conf
    owner: slurm
    group: slurm
    mode: '0600'
  notify: Reiniciar slurmdbd
  tags:
    - config_slurmdbd

- name: Iniciar servicio SlurmDBD
  ansible.builtin.service:
    name: slurmdbd
    state: started
    enabled: yes
  tags:
    - start_slurmdbd
