---
# ===== Configuración de MariaDB =====

- name: Instalar mariadb y dependencias
  ansible.builtin.apt:
    name:
      - mariadb-server
      - mariadb-client
      - python3-pymysql
    state: present
  tags:
    - install_mariadb

- name: Iniciar servicio MariaDB
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes
  tags:
    - start_mariadb

- name: Crear BD para Slurm Accounting
  community.mysql.mysql_db:
    name: "{{ db_slurm_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  tags:
    - create_database

- name: Crear Usuario de Base de Datos y dar permisos
  community.mysql.mysql_user:
    name: "{{ db_slurm_user }}"
    password: "{{ db_slurm_pass }}"
    priv: "{{ db_slurm_name }}.*:ALL"
    host: "localhost" 
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  tags:
    - create_user

- name: Optimizar MariaDB para Slurm Accounting
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: '\[mysqld\]'
  loop:
    - { regexp: '^innodb_buffer_pool_size', line: 'innodb_buffer_pool_size = 1G' }
    - { regexp: '^innodb_log_file_size', line: 'innodb_log_file_size = 64M' }
    - { regexp: '^innodb_lock_wait_timeout', line: 'innodb_lock_wait_timeout = 900' }
    - { regexp: '^innodb_flush_log_at_trx_commit', line: 'innodb_flush_log_at_trx_commit = 2' }
  notify: Reiniciar mariadb
  tags:
    - optimize_mariadb
