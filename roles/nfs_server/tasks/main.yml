---
# ===== Servidor NFS (Headnode) =====

- name: Instalar nfs-kernel-server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
  tags:
    - install_nfs

- name: Crear directorios para exportar NFS
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: '0777'
  loop:
    - /home
    - /nfs/general
    - /nfs/privileged
  tags:
    - nfs_config

- name: Configurar exports NFS
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    mode: '0644'
  notify: Reiniciar nfs
  tags:
    - nfs_config

- name: Aplicar configuración de exports
  ansible.builtin.command: exportfs -ra
  tags:
    - nfs_config
